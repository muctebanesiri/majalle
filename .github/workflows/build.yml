name: Build and Release ZIM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: contains(github.event.head_commit.message, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for tags (version counter)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y zim-tools

      - name: Convert Markdown to HTML
        run: |
          mkdir -p src/html
          for md in src/md/*.md; do
            base=$(basename "$md" .md)
            python scripts/convert_md_to_html.py --md "$md" --html "src/html/${base}.html"
          done

      - name: Copy static assets
        run: |
          cp src/static/pasha.png src/html/ 2>/dev/null || true
          cp src/static/icon_48.png src/html/ 2>/dev/null || true

      - name: Build index page
        run: python scripts/build_index.py --html-dir src/html --template-dir src/templates

      - name: Generate version tag (per‑day counter)
        id: version
        run: |
          # Fetch all tags to ensure we have them
          git fetch --tags
          TODAY=$(date +%Y-%m-%d)
          COUNTER=1
          # Check if tag "TODAY-COUNTER" exists; increment until free
          while git rev-parse "$TODAY-$COUNTER" >/dev/null 2>&1; do
            COUNTER=$((COUNTER + 1))
          done
          VERSION="$TODAY-$COUNTER"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using version: $VERSION"

      - name: Build ZIM file
        run: |
          chmod +x scripts/build_zim.sh
          ./scripts/build_zim.sh "$VERSION"
        env:
          VERSION: ${{ env.VERSION }}

      - name: Debug – list generated files
        run: |
          echo "ZIM_FILE from environment: ${{ env.ZIM_FILE }}"
          ls -la
          ls -la majalle-*.zim || echo "No ZIM file found"

      - name: Generate changelog & contributors
        id: changelog
        run: |
          clean_subject() {
            echo "$1" | sed -E 's/^[Rr][Ee][Ll][Ee][Aa][Ss][Ee]:[[:space:]]*//; s/^[Rr][Ee][Ll][Ee][Aa][Ss][Ee][[:space:]]+//'
          }
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$LAST_TAG" = "none" ]; then
            LOG=$(git log --pretty=format:"%s|%aN|%aE" HEAD)
          else
            LOG=$(git log --pretty=format:"%s|%aN|%aE" $LAST_TAG..HEAD)
          fi
          echo "Changes" > release_body.md
          echo "" >> release_body.md
          declare -A mention_map
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            subject="${line%%|*}"
            rest="${line#*|}"
            name="${rest%|*}"
            email="${rest##*|}"
            mention=$(echo "$email" | cut -d'@' -f1)
            # skip invalid mentions
            if [[ "$mention" == *"github-actions"* ]] || [[ "$mention" == *"actions"* ]] || [[ "$mention" == "git" ]] || [[ "$mention" == "noreply" ]] || [[ "$mention" == "user" ]]; then
              continue
            fi
            cleaned=$(clean_subject "$subject")
            echo "- $cleaned (by @$mention)" >> release_body.md
            mention_map["$mention"]="$name"
          done <<< "$LOG"
          echo "" >> release_body.md
          echo "Contributors" >> release_body.md
          echo "" >> release_body.md
          mentions=()
          for m in "${!mention_map[@]}"; do
            mentions+=("$m")
          done
          if [ ${#mentions[@]} -eq 0 ]; then
            echo "- @muctebanesiri" >> release_body.md
          else
            for mention in $(printf '%s\n' "${mentions[@]}" | sort -u); do
              echo "- @$mention" >> release_body.md
            done
          fi
          echo "CHANGELOG_FILE=release_body.md" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: ${{ env.CHANGELOG_FILE }}
          files: ${{ env.ZIM_FILE }}
          fail_on_unmatched_files: true
