name: Build and Release ZIM

on:
  push:
    branches:
      - main
    # No paths filter – any commit with "release" triggers

permissions:
  contents: write

jobs:
  build:
    if: contains(github.event.head_commit.message, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y zim-tools

      - name: Convert Markdown to HTML
        run: |
          mkdir -p src/html
          for md in src/md/*.md; do
            base=$(basename "$md" .md)
            python scripts/convert_md_to_html.py --md "$md" --html "src/html/${base}.html"
          done

      - name: Copy static assets
        run: |
          cp src/static/pasha.png src/html/ 2>/dev/null || true
          cp src/static/icon_48.png src/html/ 2>/dev/null || true

      - name: Build index and search JSON
        run: python scripts/build_index.py --html-dir src/html --template-dir src/templates

      - name: Build ZIM file
        run: |
          chmod +x scripts/build_zim.sh
          ./scripts/build_zim.sh

      - name: Get last release tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV

      - name: Generate changelog (strip "release" from subjects) and contributors
        id: changelog
        run: |
          # Remove "release:" or "release " (case‑insensitive) from start of subject
          clean_subject() {
            echo "$1" | sed -E 's/^[Rr][Ee][Ll][Ee][Aa][Ss][Ee][[:space:]]*//; s/^[Rr][Ee][Ll][Ee][Aa][Ss][Ee]:[[:space:]]*//'
          }
          if [ "$LAST_TAG" = "none" ]; then
            COMMITS=$(git log --pretty=format:"%s|%an" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s|%an" $LAST_TAG..HEAD)
          fi
          echo "# تغییرات" > release_body.md
          echo "" >> release_body.md
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              subject="${line%|*}"
              author="${line#*|}"
              cleaned=$(clean_subject "$subject")
              echo "- $cleaned ($author)" >> release_body.md
            fi
          done <<< "$COMMITS"
          echo "" >> release_body.md
          echo "## مشارکت‌کنندگان" >> release_body.md
          echo "" >> release_body.md
          AUTHORS=$(echo "$COMMITS" | cut -d'|' -f2 | sort -u)
          for author in $AUTHORS; do
            echo "- $author" >> release_body.md
          done
          echo "CHANGELOG_FILE=release_body.md" >> $GITHUB_ENV

      - name: Set version (date only)
        id: version
        run: |
          VERSION=$(date +%Y-%m-%d)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: ${{ env.CHANGELOG_FILE }}
          files: laws_*.zim
          fail_on_unmatched_files: true
