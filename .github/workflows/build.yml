name: Build and Release ZIM

on:
  push:
    paths:
      - 'src/md/**/*.md'
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    # Only run if commit message contains "release" (case-insensitive)
    if: contains(github.event.head_commit.message, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for tags and changelog

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y zim-tools

      - name: Convert Markdown to HTML
        run: |
          mkdir -p src/html
          for md in src/md/*.md; do
            base=$(basename "$md" .md)
            python scripts/convert_md_to_html.py --md "$md" --html "src/html/${base}.html"
          done

      - name: Copy static assets
        run: |
          cp src/static/pasha.png src/html/ 2>/dev/null || true
          cp src/static/icon_48.png src/html/ 2>/dev/null || true

      - name: Build index and search JSON
        run: python scripts/build_index.py --html-dir src/html --template-dir src/templates

      - name: Build ZIM file
        run: |
          chmod +x scripts/build_zim.sh
          ./scripts/build_zim.sh

      - name: Get last release tag
        id: last_tag
        run: |
          # Get the most recent tag (fallback to first commit if no tags exist)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV

      - name: Generate changelog since last release
        id: changelog
        run: |
          if [ "$LAST_TAG" = "none" ]; then
            # No previous tag – list all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%an)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%an)" $LAST_TAG..HEAD)
          fi
          # Write changelog to a file
          echo "$CHANGELOG" > ./release_body.md
          echo "CHANGELOG_FILE=./release_body.md" >> $GITHUB_ENV

      - name: Set version (date only)
        id: version
        run: |
          VERSION=$(date +%Y-%m-%d)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Release version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: ${{ env.CHANGELOG_FILE }}
          files: laws_*.zim
          fail_on_unmatched_files: true
