<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | مجله قوانین ایران</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8f9fa;
            font-family: 'Vazir', 'Segoe UI', 'Tahoma', sans-serif;
            color: #202122;
            line-height: 1.7;
        }
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .law-title {
            font-size: 1.8rem;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 1rem;
            border-right: 4px solid #1a73e8;
            padding-right: 1rem;
        }
        .metadata {
            background: #f1f3f5;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: #495057;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .metadata span {
            font-weight: bold;
            color: #2c3e50;
        }
        .law-content {
            font-size: 1rem;
        }
        /* Article style – each ماده separated by a line */
        .law-content h2, .law-content h3 {
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1e466e;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 0.3rem;
        }
        .law-content p {
            margin-bottom: 1rem;
            text-align: justify;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #1a73e8;
            text-decoration: none;
            border-top: 1px solid #e9ecef;
            padding-top: 1rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .container { margin: 1rem; padding: 1rem; }
            .law-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="law-title">{{ title }}</div>
    <div class="metadata">
        <div><span>تاریخ تصویب:</span> {{ date }}</div>
        <div><span>مرجع تصویب:</span> {{ organ }}</div>
    </div>
    <div class="law-content">
        {{ content|safe }}
    </div>
    <a class="back-link" href="index.html">← بازگشت به فهرست</a>
</div>
</body>
</html>
