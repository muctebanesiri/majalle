<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body { background: white; color: black; font-family: sans-serif; line-height: 1.5; margin: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        .law-title { text-align: center; font-size: 1.6rem; font-weight: bold; margin-bottom: 1rem; }
        .metadata { background: #f5f5f5; padding: 0.8rem; margin-bottom: 1.5rem; border-radius: 4px; }
        .metadata div { margin-bottom: 0.3rem; }
        .metadata span { font-weight: bold; }
        .law-content { text-align: justify; }
        .h1, h2 {text-align: center; font-weight: bold;}
        .h3, h4, h5, h6 {text-align: right; font-weight: normal;}
        .law-content h2, .law-content h3 {
            font-size: 1.2rem;
            margin-top: 1.2rem;
            margin-bottom: 0.3rem;
        }
        .law-content p { margin-bottom: 0.8rem; }
        .back-link { display: inline-block; margin-top: 2rem; color: #0645ad; text-decoration: none; border-top: 1px solid #ccc; padding-top: 1rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="law-title">{{ title }}</div>
    <div class="metadata">
        <div><span>تاریخ تصویب:</span> {{ date }}</div>
        <div><span>مرجع تصویب:</span> {{ organ }}</div>
    </div>
    <div class="law-content">
        {{ content|safe }}
    </div>
    <a class="back-link" href="index.html">← بازگشت به فهرست</a>
</div>
</body>
</html>
