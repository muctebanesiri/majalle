<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجله قوانین ایران</title>
    <style>
        body { background: white; color: black; font-family: sans-serif; line-height: 1.5; margin: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: normal; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 0.5rem; }
        a { text-decoration: none; color: #0645ad; }
        a:hover { text-decoration: underline; }
        footer { margin-top: 2rem; font-size: 0.8rem; color: #555; border-top: 1px solid #ccc; padding-top: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>مجله قوانین ایران</h1>
    <ul id="lawList"></ul>
    <footer>قوانین ایران – نسخه آفلاین</footer>
</div>
<script>
    var laws = LAWS_ARRAY_PLACEHOLDER;
    var container = document.getElementById('lawList');
    for (var i = 0; i < laws.length; i++) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = laws[i].url;
        a.textContent = laws[i].title;
        li.appendChild(a);
        container.appendChild(li);
    }
</script>
</body>
</html>
